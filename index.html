<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Kick Paraşüt Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* ── İNİŞ ALANI ── */
    #landing-pad {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    /* ── PARAŞÜT ── */
    .parachute-wrapper {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fallDown 20s linear forwards;
      z-index: 10;
    }

    @keyframes fallDown {
      0%   { top: -280px; opacity: 0;   transform: translateX(0vw)   rotate(0deg);  }
      3%   { opacity: 1; }
      18%  { top:  6vh;   transform: translateX(38vw)  rotate(10deg); }
      34%  { top: 20vh;   transform: translateX(-34vw) rotate(-9deg); }
      50%  { top: 35vh;   transform: translateX(26vw)  rotate(7deg);  }
      64%  { top: 48vh;   transform: translateX(-18vw) rotate(-5deg); }
      76%  { top: 57vh;   transform: translateX(9vw)   rotate(2deg);  }
      86%  { top: 64vh;   opacity: 1;   transform: translateX(0vw)   rotate(0deg);  }
      93%  { top: 71vh;   opacity: 0.8; transform: translateX(0vw)   rotate(0deg);  }
      100% { top: 75vh;   opacity: 0;   transform: translateX(0vw)   rotate(0deg);  }
    }

    .username-label {
      background: rgba(0, 0, 0, 0.72);
      border: 2px solid #53fc1b;
      border-radius: 20px;
      padding: 4px 16px;
      color: #53fc1b;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 0 0 8px rgba(83, 252, 27, 0.9);
      white-space: nowrap;
      margin-bottom: 5px;
    }

    .rate-badge {
      background: rgba(0,0,0,0.65);
      border-radius: 10px;
      padding: 3px 10px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-top: 4px;
    }
    .rate-low    { color: #ff4d4d; }
    .rate-mid    { color: #ffa500; }
    .rate-high   { color: #53fc1b; }
    .rate-perfect{ color: #ffd700; text-shadow: 0 0 8px #ffd700; }

    /* ── WINNER ── */
    .winner-banner {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      z-index: 9999; text-align: center; pointer-events: none;
    }
    .winner-banner.show {
      animation:
        winnerIn    0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards,
        winnerPulse 1.2s ease-in-out 0.6s infinite,
        winnerOut   0.8s ease-in 4.2s forwards;
    }
    @keyframes winnerIn {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(-8deg); opacity:0; }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0deg);  opacity:1; }
    }
    @keyframes winnerPulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);    filter: brightness(1);   }
      50%     { transform: translate(-50%,-50%) scale(1.06); filter: brightness(1.4); }
    }
    @keyframes winnerOut {
      0%   { opacity:1; transform: translate(-50%,-50%) scale(1);   }
      100% { opacity:0; transform: translate(-50%,-50%) scale(0.8); }
    }
    .winner-box {
      background: linear-gradient(135deg,#1a0800,#3a1400,#1a0800);
      border: 4px solid #ffd700; border-radius: 20px; padding: 28px 44px;
      box-shadow: 0 0 50px #ffd700, 0 0 100px rgba(255,215,0,.4), inset 0 0 30px rgba(255,215,0,.1);
      position: relative; overflow: hidden;
    }
    .winner-box::before {
      content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
      background: conic-gradient(transparent 0deg,rgba(255,215,0,.3) 60deg,transparent 120deg,
        rgba(255,215,0,.3) 180deg,transparent 240deg,rgba(255,215,0,.3) 300deg,transparent 360deg);
      animation: spinBorder 3s linear infinite;
    }
    @keyframes spinBorder { to { transform: rotate(360deg); } }
    .winner-sub   { position:relative;z-index:1;font-size:16px;font-weight:700;color:#ffd700;
                    letter-spacing:5px;text-shadow:0 0 20px #ffd700;margin-bottom:6px; }
    .winner-title { position:relative;z-index:1;font-size:40px;font-weight:900;color:#fff;
                    letter-spacing:3px;text-shadow:0 0 20px #ffd700,0 0 50px #ffa500,2px 2px 0 #000; }
    .winner-name  { position:relative;z-index:1;font-size:34px;font-weight:900;color:#ffd700;
                    letter-spacing:2px;text-shadow:0 0 20px #ffd700,0 0 40px #ff8c00,2px 2px 0 #000;
                    margin-top:6px; }

    /* ── Konfeti ── */
    .confetti-box { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;overflow:hidden; }

  </style>
</head>

// ── PARAŞÜT OLUŞTUR ──────────────────────────────────────────────
let activeCount = 0;

function spawnParachute(username) {
  if (activeCount >= CONFIG.maxParachutes) return;
  activeCount++;
  document.getElementById('landing-pad').style.opacity = '0.88';

  let leftPct, rate;

  // %80 piste in → rekabet yüksek | %20 pist dışı → nadir hata
  const padPct = (124 / (window.innerWidth || 1920)) * 100; // dış halka % genişliği
  let spread;
  if (Math.random() < 0.80) {
    spread = (Math.random() * 2 - 1) * padPct * 0.92;  // pist içi (halka sınırının %92'si)
  } else {
    const mag = padPct + rand(2, 26);                   // pist dışı
    spread    = (Math.random() < 0.5 ? -1 : 1) * mag;
  }
  leftPct = Math.max(2, Math.min(88, 50 + spread));

  // ── Başarı oranı: paraşüt merkezinin pist merkezine PİKSEL mesafesine göre ──
  // Landing pad SVG'si: dış halka rx=124px, orta rx=82px, iç rx=42px, merkez rx=12px
  const screenW    = window.innerWidth || 1920;
  const padCenter  = screenW / 2;                          // pisin ekran ortası
  const chutePx    = (leftPct / 100) * screenW;            // paraşüt merkezi (px)
  const distPx     = Math.abs(chutePx - padCenter);        // pist merkezine mesafe

  if      (distPx <= 12)  rate = 100;                                                     // tam merkez noktası
  else if (distPx <= 42)  rate = Math.round(99 - ((distPx - 12)  / 30)  * 14);           // iç halka  → %99-%85
  else if (distPx <= 82)  rate = Math.round(85 - ((distPx - 42)  / 40)  * 30);           // orta halka→ %84-%55
  else if (distPx <= 124) rate = Math.round(55 - ((distPx - 82)  / 42)  * 35);           // dış halka → %54-%20
  else                    rate = Math.max(1, Math.round(19 - ((distPx - 124) / 400) * 18)); // pist dışı → %19-%1

  const palette = CHUTE_PALETTES[rand(0, CHUTE_PALETTES.length - 1)];

  const wrapper = document.createElement('div');
  wrapper.className = 'parachute-wrapper';
  wrapper.style.left = `calc(${leftPct}% - 70px)`;

  const label = document.createElement('div');
  label.className = 'username-label';
  label.textContent = '@' + username;

  const svgWrap = document.createElement('div');
  svgWrap.innerHTML = buildSVG(palette[0], palette[1]);

  const badge = document.createElement('div');
  badge.className = 'rate-badge';
  badge.style.opacity = '0';
  badge.style.transition = 'opacity 0.4s ease';
  const sp = document.createElement('span');
  sp.className = getRateClass(rate);
  sp.textContent = rate + '%';
  badge.appendChild(document.createTextNode('Başarı: '));
  badge.appendChild(sp);

  wrapper.appendChild(label);
  wrapper.appendChild(svgWrap);
  wrapper.appendChild(badge);
  document.body.appendChild(wrapper);

  // Badge'i iniş anında göster (%86 = 20s * 0.86 ≈ 17.2s)
  const ANIM_DURATION = 20000;
  setTimeout(() => { badge.style.opacity = '1'; }, ANIM_DURATION * 0.86);

  wrapper.addEventListener('animationend', () => {
    wrapper.remove();
    activeCount--;
    if (activeCount === 0) document.getElementById('landing-pad').style.opacity = '0';
  });

  if (rate === 100) setTimeout(() => showWinner(username), ANIM_DURATION * 0.86 + 500);
}

// ── WINNER ───────────────────────────────────────────────────────
let winnerTimer = null;

function showWinner(username) {
  const banner = document.getElementById('winner-banner');
  document.getElementById('winner-name').textContent = '@' + username;
  if (winnerTimer) { clearTimeout(winnerTimer); banner.classList.remove('show'); void banner.offsetWidth; }
  banner.classList.add('show');
  spawnConfetti();
  winnerTimer = setTimeout(() => { banner.classList.remove('show'); clearConfetti(); winnerTimer = null; }, 5000);
}

// ── KONFETİ ──────────────────────────────────────────────────────
const CF_COLORS = ['#ffd700','#ff4500','#53fc1b','#00bfff','#ff69b4','#fff','#ff8c00','#adff2f'];
let confettiTimer = null;

function spawnConfetti() {
  clearConfetti();
  if (!document.getElementById('cf-style')) {
    const s = document.createElement('style');
    s.id = 'cf-style';
    s.textContent = `@keyframes cfFall{0%{top:-20px;opacity:1;transform:rotate(0) translateX(0)}
      25%{transform:rotate(90deg) translateX(18px)}50%{transform:rotate(180deg) translateX(-18px)}
      75%{transform:rotate(270deg) translateX(18px)}100%{top:110vh;opacity:0;transform:rotate(360deg) translateX(0)}}`;
    document.head.appendChild(s);
  }
  const box = document.getElementById('confetti-box');
  confettiTimer = setInterval(() => {
    for (let i = 0; i < 7; i++) {
      const p   = document.createElement('div');
      const sz  = rand(6,14), left = rand(0,100);
      const dur = (rand(25,50)/10).toFixed(1), del = (Math.random()*.5).toFixed(2);
      const shapes = ['50%','0%','50% 0'];
      p.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;left:${left}%;top:-20px;
        background:${CF_COLORS[rand(0,CF_COLORS.length-1)]};border-radius:${shapes[rand(0,2)]};opacity:0;
        animation:cfFall ${dur}s ${del}s linear forwards;`;
      box.appendChild(p);
      setTimeout(() => p.remove(), (parseFloat(dur)+parseFloat(del)+.5)*1000);
    }
  }, 140);
}

function clearConfetti() {
  if (confettiTimer) { clearInterval(confettiTimer); confettiTimer = null; }
  document.getElementById('confetti-box').innerHTML = '';
}

// ── YARDIMCI ─────────────────────────────────────────────────────
function rand(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }

function getRateClass(r) {
  if (r === 100) return 'rate-perfect';
  if (r >= 70)   return 'rate-high';
  if (r >= 40)   return 'rate-mid';
  return 'rate-low';
}

function handleChatMessage(username, message) {
  if (message.trim().toLowerCase() === CONFIG.command.toLowerCase()) spawnParachute(username);
}


// ── KICK WEBSOCKET ────────────────────────────────────────────────
connectToKick(CONFIG.kickChannel);

async function connectToKick(channelName) {
  // Kick, WebSocket için sayısal chatroom ID gerektirir — önce API'den çek
  let chatroomId;
  try {
    const res  = await fetch(`https://kick.com/api/v2/channels/${channelName}`);
    const data = await res.json();
    chatroomId = data?.chatroom?.id;
  } catch(e) {
    console.warn('Kick API ulaşılamadı, 10sn sonra tekrar denenecek:', e);
    setTimeout(() => connectToKick(channelName), 10000);
    return;
  }

  if (!chatroomId) {
    console.error('Chatroom ID bulunamadı — kanal adını kontrol et:', channelName);
    return;
  }

  console.log(`Kick bağlantısı kuruluyor — kanal: ${channelName}, chatroom ID: ${chatroomId}`);

  const wsUrl = `wss://ws-us2.pusher.com/app/32cbd69e4b950bf97679?protocol=7&client=js&version=7.0.3&flash=false`;
  let socket, pingTimer;

  function connect() {
    socket = new WebSocket(wsUrl);
    socket.onopen = () => {
      console.log('WebSocket açık');
      pingTimer = setInterval(() => socket.readyState===1 && socket.send(JSON.stringify({event:'pusher:ping',data:{}})), 30000);
    };
    socket.onmessage = (e) => {
      try {
        const p = JSON.parse(e.data);
        if (p.event === 'pusher:connection_established') {
          socket.send(JSON.stringify({event:'pusher:subscribe',data:{auth:'',channel:`chatrooms.${chatroomId}.v2`}}));
          console.log(`Chatroom ${chatroomId} kanalına abone olundu`);
        }
        if (p.event === 'App\\Events\\ChatMessageEvent') {
          const d = JSON.parse(p.data);
          handleChatMessage(d?.sender?.username || d?.user?.username || 'unknown', d?.content || '');
        }
      } catch(_){}
    };
    socket.onclose = () => {
      console.warn('WebSocket kapandı, 5sn sonra yeniden bağlanılacak');
      clearInterval(pingTimer);
      setTimeout(connect, 5000);
    };
  }
  connect();
}
